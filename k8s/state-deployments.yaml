apiVersion: apps/v1
kind: Deployment
metadata:
  name: bacteria-stable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bacteria-stable
  template:
    metadata:
      labels:
        app: bacteria-stable
    spec:
      containers:
        - name: stable
          image: bacteria-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.main", "state", "--state", "stable_vivant", "--grpc-port", "50051", "--metrics-port", "9101"]
          ports:
            - containerPort: 50051
            - containerPort: 9101
          envFrom:
            - configMapRef:
                name: bacteria-config
---
apiVersion: v1
kind: Service
metadata:
  name: bacteria-stable
spec:
  selector:
    app: bacteria-stable
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9101
      targetPort: 9101
---
